<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Score Entry</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<header>
    <div class="logo">
        🎳 Strike Zone Invitational
    </div>
    <div class="subtitle">
        Score Entry
    </div>
</header>


<section class="cards">

<div class="card">

<h2>Enter Scores</h2>

<label>

</label>

<br><br>


<label>

<select id="team">
</select>


<div id="players">

</div>


<button id="submitScores">
Submit Scores
</button>


</div>

</section>


<script src="data.js"></script>
<script src="score-entry.js"></script>


</body>
</html>
